<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Students - ID Card Portal</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { box-sizing: border-box; }

    body { margin: 0; background-color: var(--bg, #f1f5f9); }

    .admin-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────── */
    .sidebar {
      background: #ffffff;
      border-right: 2px solid #e2e8f0;
      padding: 24px;
      position: fixed;
      width: 240px;
      height: 100vh;
      overflow-y: auto;
      z-index: 10;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 32px;
      color: var(--text, #1e293b);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-nav a {
      padding: 11px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text, #1e293b);
      font-weight: 500;
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-nav a:hover { background: #f1f5f9; }
    .sidebar-nav a.active { background: var(--accent, #3b82f6); color: white; }

    /* ── Main ─────────────────────────────────── */
    .main-content {
      grid-column: 2;
      padding: 32px 36px;
      overflow: auto;
    }

    /* ── Top bar ──────────────────────────────── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .back-link {
      color: var(--accent, #3b82f6);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.75; }

    .school-heading-area { flex: 1; text-align: center; }
    .school-heading-area h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text, #1e293b);
      margin: 0 0 4px;
    }
    .school-code-badge {
      display: inline-block;
      background: #eff6ff;
      color: var(--accent, #3b82f6);
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .top-bar-right { display: flex; gap: 10px; align-items: center; }

    /* ── Summary cards ────────────────────────── */
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .summary-card {
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 18px 24px;
      flex: 1;
      min-width: 140px;
      text-align: center;
    }

    .summary-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent, #3b82f6);
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-label {
      font-size: 13px;
      color: var(--muted, #64748b);
      font-weight: 500;
    }

    /* ── Search bar ───────────────────────────── */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-bar input,
    .search-bar select {
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text, #1e293b);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    .search-bar input { flex: 1; min-width: 220px; }
    .search-bar select { min-width: 160px; cursor: pointer; }
    .search-bar input:focus,
    .search-bar select:focus { border-color: var(--accent, #3b82f6); }

    /* ── Class accordion ──────────────────────── */
    .classes-container { display: flex; flex-direction: column; gap: 16px; }

    .class-section {
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .class-section:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

    .class-header {
      background: var(--accent, #3b82f6);
      color: white;
      padding: 14px 22px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 15px;
      user-select: none;
      transition: background 0.2s;
    }
    .class-header:hover { background: #2563eb; }

    .class-header-left { display: flex; align-items: center; gap: 14px; }
    .class-header-right { display: flex; align-items: center; gap: 14px; }

    .btn-export-class {
      background: rgba(255,255,255,0.18);
      color: white;
      border: 1.5px solid rgba(255,255,255,0.45);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn-export-class:hover {
      background: rgba(255,255,255,0.32);
      border-color: white;
    }

    .class-tag {
      font-size: 16px;
      font-weight: 700;
    }
    .class-count-pill {
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-icon {
      font-size: 20px;
      transition: transform 0.3s ease;
    }
    .class-section.collapsed .toggle-icon { transform: rotate(-90deg); }

    .class-body {
      overflow: hidden;
      max-height: 2000px;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }
    .class-section.collapsed .class-body { max-height: 0; }

    /* ── Students table ───────────────────────── */
    .students-table {
      width: 100%;
      border-collapse: collapse;
    }

    .students-table thead { background: #f8fafc; }

    .students-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted, #64748b);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
      background: #f8fafc;
    }

    .students-table td {
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text, #1e293b);
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    .students-table tr:last-child td { border-bottom: none; }
    .students-table tbody tr:hover { background: #f8fafc; }

    .roll-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #eff6ff;
      color: var(--accent, #3b82f6);
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .student-name { font-weight: 600; }
    .phone-cell { font-family: 'Courier New', monospace; font-size: 13px; color: var(--muted, #64748b); }
    .address-cell { max-width: 260px; color: var(--muted, #64748b); font-size: 13px; }
    .submitted-cell { font-size: 12px; color: #94a3b8; }

    .delete-btn {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: #dc2626; color: white; border-color: #dc2626; }

    /* ── Empty / loading states ───────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted, #64748b);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { margin: 0; font-size: 15px; }

    .loading-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted, #64748b);
      font-size: 16px;
    }

    /* ── Buttons ──────────────────────────────── */
    .btn-primary {
      background: var(--accent, #3b82f6);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

    .btn-secondary {
      background: #f8fafc;
      color: var(--text, #1e293b);
      border: 2px solid #e2e8f0;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 2px solid #e2e8f0; }
      .main-content { grid-column: 1; padding: 20px; }
      .top-bar { flex-direction: column; align-items: flex-start; }
      .school-heading-area { text-align: left; }
      .address-cell { max-width: 160px; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">🪪 ID Card Admin</div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard">📊 Dashboard</a>
        <a href="/admin/login">🚪 Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="/admin/dashboard" class="back-link">← Back to Dashboard</a>

        <div class="school-heading-area">
          <h1 id="schoolHeading">Loading…</h1>
          <span class="school-code-badge" id="schoolCodeBadge"></span>
        </div>

        <div class="top-bar-right">
          <button class="btn-secondary" id="refreshBtn" title="Refresh data">🔄 Refresh</button>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-num" id="totalStudents">—</div>
          <div class="summary-label">Total Students</div>
        </div>
        <div class="summary-card">
          <div class="summary-num" id="totalClasses">—</div>
          <div class="summary-label">Total Classes</div>
        </div>
        <div class="summary-card">
          <div class="summary-num" id="latestEntry">—</div>
          <div class="summary-label">Latest Entry</div>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="search-bar">
        <input type="text" id="nameSearch" placeholder="🔍  Search by name, roll no, phone, or address…">
        <select id="classFilter">
          <option value="">All Classes</option>
        </select>
      </div>

      <!-- Students by Class -->
      <div id="classesContainer">
        <div class="loading-state">⏳ Loading student data…</div>
      </div>

    </main>
  </div>

  <script src="/admin/js/school.js"></script>
</body>
</html>
